# Auto-deploy production on every push to `main`.
# GitHub repo → Settings → Secrets and variables → Actions → New repository secret:
#   VERCEL_TOKEN = create at https://vercel.com/account/tokens (scope: full account or this project)
#
# Alternative (no Actions): Vercel Dashboard → clasher → Settings → Git → Connect Repository
# (then Vercel builds on push without this workflow).

name: Deploy Production to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_T9KRCYcoLh8xN9gghpsDKeyC
      VERCEL_PROJECT_ID: prj_E0GX9npaGoraBe53wjcNI8iNJkgp
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # CLI needs project metadata when the repo has no committed `.vercel/` folder.
      - name: Write Vercel project metadata
        run: |
          mkdir -p .vercel
          echo '{"projectId":"prj_E0GX9npaGoraBe53wjcNI8iNJkgp","orgId":"team_T9KRCYcoLh8xN9gghpsDKeyC","projectName":"clasher"}' > .vercel/project.json

      - name: Deploy to Vercel (production)
        run: npx --yes vercel@latest deploy --prod --yes --token "$VERCEL_TOKEN"
